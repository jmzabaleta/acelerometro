<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="acelerometro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>acelerometro</title>
  <link rel="manifest" href="manifest.json">
  <script>
    window.tiltBallMotion = (() => {
      let started = false;

      const emitError = (message) => {
        window.dispatchEvent(new CustomEvent('tilt-ball-motion-error', {
          detail: String(message || 'Motion sensor unavailable'),
        }));
      };

      const emitMotion = (event) => {
        const acceleration = event.accelerationIncludingGravity || event.acceleration;

        if (!acceleration) {
          return;
        }

        window.dispatchEvent(new CustomEvent('tilt-ball-motion', {
          detail: {
            x: Number(acceleration.x || 0),
            y: Number(acceleration.y || 0),
            z: Number(acceleration.z || 0),
          },
        }));
      };

      const start = async () => {
        if (!('DeviceMotionEvent' in window)) {
          emitError('DeviceMotionEvent is not supported by this browser.');
          return false;
        }

        try {
          if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const permission = await DeviceMotionEvent.requestPermission();

            if (permission !== 'granted') {
              emitError('Motion permission was not granted.');
              return false;
            }
          }

          if (!started) {
            window.addEventListener('devicemotion', emitMotion, true);
            started = true;
          }

          return true;
        } catch (error) {
          emitError(error);
          return false;
        }
      };

      return { start };
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
